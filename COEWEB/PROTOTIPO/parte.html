<div class="container"><input id="slider" class="slider" list="values" max="20000" min="0" step="5000" type="range" value="20000" />&nbsp;

<div id="left" class="left"></div>

</div>

&nbsp;

</div>
<script>
  (function() {
    // Buscar los elementos dentro del contenedor para evitar conflictos
    const container = document.querySelector('.mi-slider-wrapper');
    if (!container) return;

    const number = container.querySelector("#number");
    const left = container.querySelector("#left");
    const right = container.querySelector("#right");
    const slider = container.querySelector("#slider");
    const separator = container.querySelector("#separator");

    let target = 20000;
    let current = 0;
    const step = 42;

    const updateValues = () => {
      const [first, ...rest] = current.toLocaleString("en-US").split(",").reverse();
      let thousends = rest.reverse();
      const thousendsString = thousends.join("");
      
      if (+left.innerText != thousendsString) {
        left.classList.add("animate");
      } else {
        left.classList.remove("animate");
      }
      left.innerText = thousendsString;
      right.innerText = first;
    };

    const update = () => {
      if (target - current > 0) {
        current += step;
      } else {
        current -= step;
      }
      
      if (current >= 1000) {
        separator.classList.add("show");
      } else {
        separator.classList.remove("show");
      }
      
      updateValues();
      
      if (Math.abs(target - current) > step) {
        requestAnimationFrame(update);
      } else {
        requestAnimationFrame(() => {
          current = target;
          updateValues();
          left.classList.remove("animate");
          right.classList.remove("animate");
        });
      }
    };

    const start = () => {
      right.classList.add("animate");
      update();
    };

    slider.addEventListener("input", (event) => {
      target = +event.target.value;
      start();
    });

    // Iniciar animación
    start();
  })();
</script>
